name: Arma SQF + Mission Config Preflight

on:
  pull_request:
  push:

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQF linter (sqflint) and ripgrep
        run: |
          python -m pip install --upgrade pip
          pip install sqflint ripgrep

      - name: Detect changed SQF/config files
        id: changed
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse --verify "${head_sha}^" >/dev/null 2>&1; then
              base_sha="${head_sha}^"
            else
              base_sha="$head_sha"
            fi
          fi

          mapfile -d '' changed_files < <(git diff -z --name-only --diff-filter=ACMR "$base_sha" "$head_sha")

          sqf_files=()
          config_files=()

          for f in "${changed_files[@]}"; do
            case "$f" in
              *.sqf)
                sqf_files+=("$f")
                ;;
            esac

            case "$f" in
              description.ext|*.hpp|*.h|*.inc|*.cfg|*.ext)
                case "$f" in
                  .git/*|.github/*|.vscode/*|node_modules/*|dist/*|build/*|vendor/*|generated/*)
                    ;;
                  *)
                    config_files+=("$f")
                    ;;
                esac
                ;;
            esac
          done

          {
            echo "sqf_files<<EOF"
            printf '%s\n' "${sqf_files[@]}"
            echo "EOF"
            echo "config_files<<EOF"
            printf '%s\n' "${config_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: SQF static analysis (changed *.sqf files only)
        run: |
          set -euo pipefail

          sqf_files="${{ steps.changed.outputs.sqf_files }}"

          if [ -z "$sqf_files" ]; then
            echo "No changed SQF files to lint."
            exit 0
          fi

          echo "Running sqflint compatibility scan before lint..."
          python3 scripts/dev/sqflint_compat_scan.py --strict $sqf_files

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            sqflint -e w "$file"
          done <<< "$sqf_files"

      - name: Mission config sanity checks (description.ext, ui/**/*.hpp, etc.)
        env:
          CHANGED_CONFIG_FILES: ${{ steps.changed.outputs.config_files }}
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          changed = [Path(p) for p in filter(None, __import__("os").environ.get("CHANGED_CONFIG_FILES", "").splitlines())]
          candidates = [p for p in changed if p.is_file()]

          if not candidates:
              print("No changed mission config/include files to check.")
              sys.exit(0)

          def strip_strings_and_comments(text: str) -> str:
              out = []
              i = 0
              n = len(text)
              in_str = False
              str_ch = ""
              in_line_comment = False
              in_block_comment = False

              while i < n:
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < n else ""

                  if in_line_comment:
                      if ch == "\n":
                          in_line_comment = False
                          out.append(ch)
                      i += 1
                      continue

                  if in_block_comment:
                      if ch == "*" and nxt == "/":
                          in_block_comment = False
                          i += 2
                      else:
                          i += 1
                      continue

                  if in_str:
                      if ch == "\\":
                          i += 2
                          continue
                      if ch == str_ch:
                          in_str = False
                      out.append(" " if ch != "\n" else "\n")
                      i += 1
                      continue

                  if ch == "/" and nxt == "/":
                      in_line_comment = True
                      i += 2
                      continue
                  if ch == "/" and nxt == "*":
                      in_block_comment = True
                      i += 2
                      continue

                  if ch in ("'", '"'):
                      in_str = True
                      str_ch = ch
                      out.append(" ")
                      i += 1
                      continue

                  out.append(ch)
                  i += 1

              return "".join(out)

          def basic_balance_checks(raw: str):
              issues = []
              stripped = strip_strings_and_comments(raw)

              pairs = {"{": "}", "(": ")", "[": "]"}
              stack = []

              for ch in stripped:
                  if ch in pairs:
                      stack.append(ch)
                  elif ch in pairs.values():
                      if not stack:
                          issues.append(f"Unmatched closing '{ch}'")
                          continue
                      opener = stack.pop()
                      if pairs[opener] != ch:
                          issues.append(f"Mismatched '{opener}' closed by '{ch}'")

              if stack:
                  issues.append(f"Unclosed delimiter(s): {''.join(stack)}")

              return issues

          failed = 0

          for p in sorted(candidates):
              raw = p.read_text(encoding="utf-8", errors="replace")
              issues = basic_balance_checks(raw)
              if issues:
                  failed += 1
                  print(f"\n{p}:")
                  for issue in issues:
                      print(f"  - {issue}")

          if failed:
              print(f"\nConfig sanity check failed in {failed} file(s).")
              sys.exit(1)

          print("Config sanity checks passed.")
          PY
      - name: State migration static validation
        run: |
          python3 scripts/dev/validate_state_migrations.py

      - name: Test log commit placeholder guard
        run: |
          bash scripts/dev/check_test_log_commits.sh

      - name: Install ripgrep (required for marker-index full-mode coverage)
        run: |
          pip install ripgrep

      - name: Marker index generator static validation (rg-on + fallback modes)
        run: |
          python3 scripts/dev/validate_marker_index.py

      - name: AIRBASE planning-mode static validation
        run: |
          tests/static/airbase_planning_mode_checks.sh

      - name: CASREQ snapshot contract static validation
        run: |
          tests/static/casreq_snapshot_contract_checks.sh
