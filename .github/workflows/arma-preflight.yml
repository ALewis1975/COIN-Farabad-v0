name: Arma SQF + Mission Config Preflight

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQF linter (sqflint)
        run: |
          python -m pip install --upgrade pip
          pip install sqflint

      - name: Detect changed SQF/config files
        id: changed
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"

          if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            # First push / branch creation: diff from empty tree so we include
            # all files present at head (not just the last commit via head^).
            base_sha="$(git hash-object -t tree /dev/null)"
          fi

          mapfile -d '' changed_files < <(git diff -z --name-only --diff-filter=ACMR "$base_sha" "$head_sha")

          sqf_files=()
          config_files=()

          for f in "${changed_files[@]}"; do
            lower_f="${f,,}"

            case "$lower_f" in
              *.sqf)
                sqf_files+=("$f")
                ;;
            esac

            case "$lower_f" in
              description.ext|*.hpp|*.h|*.inc|*.cfg|*.ext)
                case "$lower_f" in
                  .git/*|.github/*|.vscode/*|node_modules/*|dist/*|build/*|vendor/*|generated/*)
                    ;;
                  *)
                    config_files+=("$f")
                    ;;
                esac
                ;;
            esac
          done

          {
            echo "sqf_files<<EOF"
            printf '%s\n' "${sqf_files[@]}"
            echo "EOF"
            echo "config_files<<EOF"
            printf '%s\n' "${config_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: SQF static analysis (changed *.sqf files only, advisory)
        continue-on-error: true
        run: |
          set -euo pipefail

          sqf_files="${{ steps.changed.outputs.sqf_files }}"

          if [ -z "$sqf_files" ]; then
            echo "No changed SQF files to lint."
            exit 0
          fi

          rc=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Linting $file"
            if ! sqflint -e w "$file"; then
              rc=1
            fi
          done <<< "$sqf_files"

          if [ "$rc" -ne 0 ]; then
            echo "sqflint reported issues. This step is advisory due to known parser gaps for modern SQF syntax."
            exit 1
          fi

      - name: Mission config sanity checks (description.ext, ui/**/*.hpp, etc.)
        env:
          CHANGED_CONFIG_FILES: ${{ steps.changed.outputs.config_files }}
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          changed = [Path(p) for p in filter(None, __import__("os").environ.get("CHANGED_CONFIG_FILES", "").splitlines())]
          candidates = [p for p in changed if p.is_file()]

          if not candidates:
              print("No changed mission config/include files to check.")
              sys.exit(0)

          def strip_strings_and_comments(text: str) -> str:
              out = []
              i = 0
              n = len(text)
              in_str = False
              str_ch = ""
              in_line_comment = False
              in_block_comment = False

              while i < n:
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < n else ""

                  if in_line_comment:
                      if ch == "\n":
                          in_line_comment = False
                          out.append(ch)
                      i += 1
                      continue

                  if in_block_comment:
                      if ch == "*" and nxt == "/":
                          in_block_comment = False
                          i += 2
                      else:
                          i += 1
                      continue

                  if in_str:
                      if ch == "\\":
                          i += 2
                          continue
                      if ch == str_ch:
                          in_str = False
                      out.append(" " if ch != "\n" else "\n")
                      i += 1
                      continue

                  if ch == "/" and nxt == "/":
                      in_line_comment = True
                      i += 2
                      continue
                  if ch == "/" and nxt == "*":
                      in_block_comment = True
                      i += 2
                      continue

                  if ch in ("'", '"'):
                      in_str = True
                      str_ch = ch
                      out.append(" ")
                      i += 1
                      continue

                  out.append(ch)
                  i += 1

              return "".join(out)

          def basic_balance_checks(raw: str):
              issues = []
              stripped = strip_strings_and_comments(raw)

              pairs = {"{": "}", "(": ")", "[": "]"}
              stack = []

              for ch in stripped:
                  if ch in pairs:
                      stack.append(ch)
                  elif ch in pairs.values():
                      if not stack:
                          issues.append(f"Unmatched closing '{ch}'")
                          continue
                      opener = stack.pop()
                      if pairs[opener] != ch:
                          issues.append(f"Mismatched '{opener}' closed by '{ch}'")

              if stack:
                  issues.append(f"Unclosed delimiter(s): {''.join(stack)}")

              return issues

          failed = 0

          for p in sorted(candidates):
              raw = p.read_text(encoding="utf-8", errors="replace")
              issues = basic_balance_checks(raw)
              if issues:
                  failed += 1
                  print(f"\n{p}:")
                  for issue in issues:
                      print(f"  - {issue}")

          if failed:
              print(f"\nConfig sanity check failed in {failed} file(s).")
              sys.exit(1)

          print("Config sanity checks passed.")
          PY
