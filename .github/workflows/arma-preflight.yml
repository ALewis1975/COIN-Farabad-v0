name: Arma SQF + Mission Config Preflight

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQF linter (sqflint)
        run: |
          python -m pip install --upgrade pip
          pip install sqflint

      - name: SQF static analysis (all *.sqf)
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          # LordGolias/sqf installs as "sqflint" on pip, but the module is "sqf"
          import sqf

          sqf_files = sorted({p for p in Path(".").rglob("*.sqf") if p.is_file()})
          if not sqf_files:
            print("No .sqf files found.")
            sys.exit(0)

          total_errors = 0
          total_warnings = 0

          for p in sqf_files:
            try:
              code = p.read_text(encoding="utf-8", errors="replace")
              ast = sqf.parser.parse(code)
              errors = sqf.analyzer.analyze(ast)

              # sqf.analyzer returns a list of exceptions/warnings (mixed types)
              # We'll count anything with "Error" in class name as error, else warning.
              file_errors = 0
              file_warnings = 0
              for e in errors:
                name = e.__class__.__name__.lower()
                if "error" in name:
                  file_errors += 1
                else:
                  file_warnings += 1

              if file_errors or file_warnings:
                print(f"\n{p}: {file_errors} error(s), {file_warnings} warning(s)")
                for e in errors[:50]:
                  print(f"  - {e}")

              total_errors += file_errors
              total_warnings += file_warnings

            except Exception as ex:
              # Hard fail if parser crashes
              print(f"\n{p}: parser/analyzer failed: {ex}")
              total_errors += 1

          print(f"\nTOTAL: {total_errors} error(s), {total_warnings} warning(s)")
          sys.exit(1 if total_errors else 0)
          PY

      - name: Mission config sanity checks (description.ext, ui/**/*.hpp, etc.)
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          # Files to include: mission config + common include types
          include_names = {"description.ext"}
          include_exts = {".hpp", ".h", ".inc", ".cfg", ".ext"}

          # Find candidates
          candidates = []
          for p in Path(".").rglob("*"):
            if not p.is_file():
              continue
            if p.name in include_names or p.suffix.lower() in include_exts:
              candidates.append(p)

          if not candidates:
            print("No mission config/include files found (description.ext, *.hpp, *.inc, etc.)")
            sys.exit(0)

          def strip_strings_and_comments(text: str) -> str:
            # Remove // and /* */ comments, but keep structure. Also remove strings to avoid braces inside quotes.
            # This is a simple lexer, not perfect, but stable for CI.
            out = []
            i = 0
            n = len(text)
            in_str = False
            str_ch = ""
            in_line_comment = False
            in_block_comment = False

            while i < n:
              ch = text[i]
              nxt = text[i+1] if i+1 < n else ""

              if in_line_comment:
                if ch == "\n":
                  in_line_comment = False
                  out.append(ch)
                i += 1
                continue

              if in_block_comment:
                if ch == "*" and nxt == "/":
                  in_block_comment = False
                  i += 2
                else:
                  i += 1
                continue

              if in_str:
                if ch == "\\":
                  # skip escaped char
                  i += 2
                  continue
                if ch == str_ch:
                  in_str = False
                # replace string content with space to preserve positions/newlines
                out.append(" " if ch != "\n" else "\n")
                i += 1
                continue

              # entering comment?
              if ch == "/" and nxt == "/":
                in_line_comment = True
                i += 2
                continue
              if ch == "/" and nxt == "*":
                in_block_comment = True
                i += 2
                continue

              # entering string?
              if ch in ("'", '"'):
                in_str = True
                str_ch = ch
                out.append(" ")
                i += 1
                continue

              out.append(ch)
              i += 1

            return "".join(out)

          def basic_balance_checks(path: Path, raw: str) -> list[str]:
            issues = []
            stripped = strip_strings_and_comments(raw)

            # Brace / paren / bracket balance
            pairs = { "{": "}", "(": ")", "[": "]" }
            stack = []
            for idx, ch in enumerate(stripped):
              if ch in pairs:
                stack.append((ch, idx))
              elif ch in pairs.values():
                if not stack:
                  issues.append(f"Unmatched closing '{ch}'")
                  continue
                opener, _ = stack.pop()
                if pairs[opener] != ch:
                  issues.append(f"Mismatched '{opener}' closed by '{ch}'")

            if stack:
              issues.append(f"Unclosed delimiter(s): {''.join(o for o, _ in stack)}")

            # Heuristic: class blocks should often end with ';' in config-style syntax
            # Detect "class X { ... }" not followed by ';'
            # (This catches a classic mistake in description.ext / *.hpp configs.)
            # We run on stripped text to ignore strings/comments.
            class_block = re.compile(r"\bclass\s+\w+\s*\{", re.IGNORECASE)
            for m in class_block.finditer(stripped):
              start = m.start()
              # Find matching closing brace for this opening brace
              # Simple scan from the first '{' after match
              brace_pos = stripped.find("{", m.end()-1)
              if brace_pos == -1:
                continue
              depth = 0
              i = brace_pos
              n = len(stripped)
              while i < n:
                if stripped[i] == "{":
                  depth += 1
                elif stripped[i] == "}":
                  depth -= 1
                  if depth == 0:
                    # Look ahead for ';' ignoring whitespace/newlines
                    j = i + 1
                    while j < n and stripped[j].isspace():
                      j += 1
                    if j >= n or stripped[j] != ";":
                      # Provide a line hint
                      line = stripped.count("\n", 0, start) + 1
                      issues.append(f"Possible missing ';' after class block near line {line}")
                    break
                i += 1

            return issues

          failed = 0
          for p in sorted(candidates):
            raw = p.read_text(encoding="utf-8", errors="replace")
            issues = basic_balance_checks(p, raw)
            if issues:
              failed += 1
              print(f"\n{p}:")
              for issue in issues:
                print(f"  - {issue}")

          if failed:
            print(f"\nConfig sanity check failed in {failed} file(s).")
            sys.exit(1)

          print("Config sanity checks passed.")
          PY
