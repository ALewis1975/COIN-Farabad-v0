name: SQF Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sqfvm
        run: |
          python -m pip install --upgrade pip
          pip install sqfvm

      - name: Lint SQF files (parse only)
        run: |
          find . -name "*.sqf" -type f | while read -r file; do
            echo "Linting $file"
            python -m sqfvm --parse-only "$file" || exit 1
          done
