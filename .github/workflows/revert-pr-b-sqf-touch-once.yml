name: Revert PR B SQF touch once

on:
  push:
    branches:
      - data/imagery-marker-alias-cleanup-2026-07-01

permissions:
  contents: write

jobs:
  revert-sqf-touch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR B branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore local support SQF from PR A base
        run: |
          set -euo pipefail
          git fetch origin docs/imagery-marker-audit-2026-07-01
          git checkout origin/docs/imagery-marker-audit-2026-07-01 -- functions/ops/fn_opsSpawnLocalSupport.sqf

      - name: Commit restore and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git rm .github/workflows/revert-pr-b-sqf-touch-once.yml
          git add functions/ops/fn_opsSpawnLocalSupport.sqf

          if git diff --cached --quiet; then
            echo "No SQF restore changes; removing temporary workflow only."
            git commit -m "ci: remove temporary PR B SQF restore workflow"
          else
            git commit -m "ops: remove PR B SQF touch"
          fi

          git push origin HEAD:${{ github.ref_name }}
